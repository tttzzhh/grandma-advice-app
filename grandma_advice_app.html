<!DOCTYPE html>

            margin: 0;
            padding: 0;

            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        }

        .header .emoji {
            font-size: 48px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .advices-list {
            list-style: none;
        }

        .advice-item {
            padding: 15px 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-left: 4px solid #f5576c;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            animation: fadeIn 0.5s ease-out;
            transition: all 0.3s ease;
        }

        .advice-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .advice-number {
            color: #f5576c;
            font-weight: bold;
            margin-right: 10px;
        }

        .footer {
            text-align: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .footer-note {
            font-size: 12px;
            color: #999;
            font-style: italic;
        }

        .button-container {
            text-align: center;
            padding: 20px 30px 30px;
        }

        .get-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .get-button:active {
            transform: translateY(0);
        }

        .get-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .hidden {
            display: none;
        }

                <div class="button-container">

        function getAdvices() {
            // 显示加载状态
            document.getElementById('initial-state').classList.add('hidden');
            document.getElementById('result-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            // 模拟加载延迟
            setTimeout(() => {
                // 随机选择10条不重复的建议
                const shuffled = [...advicesDatabase].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 10);

                // 渲染建议列表
                const listElement = document.getElementById('advices-list');
                listElement.innerHTML = '';

                selected.forEach((advice, index) => {
                    // 确保每条不超过40字
                    let truncatedAdvice = advice.length > 40 ? advice.substring(0, 40) + '...' : advice;

                    const li = document.createElement('li');
                    li.className = 'advice-item';
                    li.style.animationDelay = `${index * 0.1}s`;
                    li.innerHTML = `<span class="advice-number">${index + 1}.</span>${truncatedAdvice}`;
                    listElement.appendChild(li);
                });

                // 显示结果状态
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('result-state').classList.remove('hidden');
            }, 800);
